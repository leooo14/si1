<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LEOPI FOOD | Repartidor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        /* Tarjeta de lista de pedidos */
        .pedidos-lista {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .pedidos-lista h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #f97316;
            border-left: 4px solid #f97316;
            padding-left: 16px;
        }
        .pedido-item {
            background: #1e293b;
            margin-bottom: 16px;
            padding: 18px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(249, 115, 22, 0.3);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        .pedido-item:hover {
            background: #334155;
            transform: translateX(6px);
            border-color: #f97316;
        }
        .pedido-numero {
            font-weight: 800;
            font-size: 1.4rem;
            color: #f97316;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .pedido-cliente {
            font-size: 0.9rem;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
        }
        .badge.ready {
            background: #10b981;
            color: white;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4);
        }
        .badge.preparing {
            background: #f59e0b;
            color: #1e293b;
        }
        /* Panel de tracking */
        .info-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(249, 115, 22, 0.3);
        }
        .info-panel > div {
            margin-bottom: 10px;
            color: #f1f5f9;
        }
        .info-panel strong {
            color: #f97316;
            font-weight: 600;
        }
        #mapa {
            height: 420px;
            border-radius: 24px;
            margin: 20px 0;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 2px solid #f97316;
        }
        button {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            color: white;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.5);
            background: linear-gradient(135deg, #ea580c, #c2410c);
        }
        .volver {
            background: linear-gradient(135deg, #475569, #334155);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: 16px;
        }
        .volver:hover {
            background: linear-gradient(135deg, #5b6c85, #475569);
        }
        .eta {
            background: #0f172a;
            padding: 12px;
            border-radius: 28px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: #f97316;
            margin: 15px 0;
            border: 1px solid #f97316;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            font-size: 1rem;
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .pedido-item { padding: 14px; }
            .pedido-numero { font-size: 1.2rem; }
            #mapa { height: 350px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="listaPanel" class="pedidos-lista">
        <h2>📋 Selecciona un pedido</h2>
        <div id="pedidosList" style="min-height: 200px;">Cargando pedidos...</div>
    </div>
    <div id="trackingPanel" class="info-panel" style="display: none;">
        <button id="btnVolver" class="volver">← Volver a la lista</button>
        <div><strong>📦 Pedido:</strong> <span id="orderNumber">---</span></div>
        <div><strong>👤 Cliente:</strong> <span id="customerName">---</span></div>
        <div><strong>📍 Dirección:</strong> <span id="customerAddress">---</span></div>
        <div id="mapa"></div>
        <div id="etaPanel" class="eta">🔄 Calculando ruta...</div>
        <button id="btnEntregar">✅ Marcar como entregado</button>
    </div>
</div>

<script>
    // USAR UN NOMBRE ÚNICO PARA EVITAR CONFLICTOS
    const SUPABASE_URL = 'https://jznsyvdasufrvudfglje.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6bnN5dmRhc3VmcnZ1ZGZnbGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODAyMDgsImV4cCI6MjA5NTI1NjIwOH0.nIHQHqEv9Gf_jZNOgpomkJ7SznGqg5dDB40kIVkIgig';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let map, routingControl, watchId, currentPedido, destinoCoords;

    async function cargarPedidos() {
        const listaDiv = document.getElementById('pedidosList');
        listaDiv.innerHTML = '<div style="text-align:center; padding:20px;">Cargando pedidos...</div>';
        try {
            const { data, error } = await supabaseClient
                .from('pedidos')
                .select('id, order_number, customer_name, delivery_address, status, destino_lat, destino_lng')
                .eq('order_type', 'delivery')
                .in('status', ['preparing', 'ready'])
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            if (!data.length) {
                listaDiv.innerHTML = '<div class="empty-state">🚚 No hay pedidos para entregar.<br>Espera a que el admin los asigne.</div>';
                return;
            }
            let html = '';
            data.forEach(p => {
                html += `<div class="pedido-item" data-id="${p.id}" data-lat="${p.destino_lat || ''}" data-lng="${p.destino_lng || ''}">
                            <div class="pedido-numero">${p.order_number}</div>
                            <div class="pedido-cliente">${p.customer_name || 'Cliente'} — ${p.delivery_address || 'Sin dirección'}</div>
                            <div class="badge ${p.status}">${p.status === 'ready' ? '✅ LISTO PARA ENVIAR' : '🟠 EN PREPARACIÓN'}</div>
                        </div>`;
            });
            listaDiv.innerHTML = html;
            document.querySelectorAll('.pedido-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const lat = el.dataset.lat ? parseFloat(el.dataset.lat) : null;
                    const lng = el.dataset.lng ? parseFloat(el.dataset.lng) : null;
                    seleccionarPedido(id, lat, lng);
                });
            });
        } catch (err) {
            listaDiv.innerHTML = `<div class="empty-state">❌ Error: ${err.message}</div>`;
        }
    }

    async function seleccionarPedido(pedidoId, lat, lng) {
        document.getElementById('listaPanel').style.display = 'none';
        document.getElementById('trackingPanel').style.display = 'block';
        const { data: pedido, error } = await supabaseClient.from('pedidos').select('*').eq('id', pedidoId).single();
        if (error || !pedido) {
            alert('Error al cargar el pedido');
            volverLista();
            return;
        }
        currentPedido = pedido;
        document.getElementById('orderNumber').innerText = pedido.order_number;
        document.getElementById('customerName').innerText = pedido.customer_name || '---';
        document.getElementById('customerAddress').innerText = pedido.delivery_address || '---';
        
        destinoCoords = (pedido.destino_lat && pedido.destino_lng) 
            ? { lat: pedido.destino_lat, lng: pedido.destino_lng }
            : { lat: -12.119, lng: -77.031 };
        
        if (map) map.remove();
        map = L.map('mapa').setView([destinoCoords.lat, destinoCoords.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
        L.marker([destinoCoords.lat, destinoCoords.lng]).addTo(map).bindPopup('📍 Cliente').openPopup();
        
        if (currentPedido.status !== 'delivered') {
            iniciarGPS();
        } else {
            document.getElementById('btnEntregar').disabled = true;
            document.getElementById('etaPanel').innerHTML = '✅ Pedido ya entregado';
        }
        
        document.getElementById('btnEntregar').onclick = async () => {
            const { error } = await supabaseClient.from('pedidos').update({ status: 'delivered', delivered_at: new Date() }).eq('id', pedidoId);
            if (!error) {
                alert('🎉 Pedido entregado. ¡Buen trabajo!');
                if (watchId) navigator.geolocation.clearWatch(watchId);
                volverLista();
            } else {
                alert('Error al actualizar');
            }
        };
    }

    function iniciarGPS() {
        if (!navigator.geolocation) {
            alert('Este navegador no soporta geolocalización');
            return;
        }
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(async (pos) => {
            const { latitude, longitude } = pos.coords;
            if (!routingControl) {
                routingControl = L.Routing.control({
                    waypoints: [L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)],
                    routeWhileDragging: false,
                    showAlternatives: false,
                    lineOptions: { styles: [{ color: '#f97316', weight: 6, opacity: 0.9 }] },
                    addWaypoints: false,
                    draggableWaypoints: false,
                    fitSelectedRoutes: false
                }).addTo(map);
                routingControl.on('routesfound', (e) => {
                    const r = e.routes[0];
                    const dist = (r.summary.totalDistance / 1000).toFixed(1);
                    const time = Math.round(r.summary.totalTime / 60);
                    document.getElementById('etaPanel').innerHTML = `📏 Distancia restante: ${dist} km · ⏱️ Tiempo estimado: ${time} min`;
                });
            } else {
                routingControl.getPlan().setWaypoints([L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)]);
            }
            // Guardar ubicación en Supabase
            await supabaseClient.from('ubicacion_repartidor').upsert({
                pedido_id: currentPedido.id,
                lat: latitude,
                lng: longitude,
                updated_at: new Date()
            });
        }, (err) => {
            console.error('GPS error:', err);
            document.getElementById('etaPanel').innerHTML = '⚠️ Error de GPS. Revisa permisos.';
        }, { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
    }

    function volverLista() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (routingControl) routingControl = null;
        if (map) map.remove();
        document.getElementById('trackingPanel').style.display = 'none';
        document.getElementById('listaPanel').style.display = 'block';
        cargarPedidos();
    }

    document.getElementById('btnVolver').onclick = volverLista;
    cargarPedidos();
</script>
</body>
</html>
