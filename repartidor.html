<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LEOPI FOOD | Panel del Repartidor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #1e293b; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        .pedidos-lista { background: #0f172a; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .pedido-item { background: #1e293b; margin-bottom: 12px; padding: 15px; border-radius: 12px; cursor: pointer; transition: all 0.2s; border-left: 4px solid #f97316; }
        .pedido-item:hover { background: #334155; transform: translateX(4px); }
        .pedido-item.seleccionado { background: #f97316; color: #0f172a; border-left-color: white; }
        .pedido-numero { font-weight: bold; font-size: 18px; }
        .pedido-cliente { font-size: 14px; opacity: 0.8; margin-top: 4px; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
        .badge.ready { background: #10b981; }
        .badge.preparing { background: #f59e0b; }
        .info-panel { background: #0f172a; border-radius: 16px; padding: 20px; margin-top: 20px; display: none; }
        #mapa { height: 400px; border-radius: 12px; margin-top: 15px; }
        button { background: #22c55e; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .eta { background: #334155; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        .volver { background: #475569; margin-bottom: 15px; }
        @media (max-width: 640px) { body { padding: 10px; } .pedido-item { padding: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div id="listaPanel" class="pedidos-lista">
        <h2>📋 Selecciona un pedido para entregar</h2>
        <div id="pedidosList"></div>
    </div>

    <div id="trackingPanel" class="info-panel">
        <button id="btnVolver" class="volver">← Volver a la lista</button>
        <div><strong>Pedido:</strong> <span id="orderNumber">---</span></div>
        <div><strong>Cliente:</strong> <span id="customerName">---</span></div>
        <div><strong>Dirección:</strong> <span id="customerAddress">---</span></div>
        <div id="mapa"></div>
        <div id="etaPanel" class="eta">🔄 Calculando ruta...</div>
        <button id="btnEntregar">✅ Marcar como entregado</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://jznsyvdasufrvudfglje.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6bnN5dmRhc3VmcnZ1ZGZnbGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODAyMDgsImV4cCI6MjA5NTI1NjIwOH0.nIHQHqEv9Gf_jZNOgpomkJ7SznGqg5dDB40kIVkIgig';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let map, routingControl, watchId, currentPedido, destinoCoords;
    let subscriptionPedidos = null;

    // Cargar lista de pedidos disponibles (delivery en estado preparing o ready)
    async function cargarPedidos() {
        const { data, error } = await supabase
            .from('pedidos')
            .select('*')
            .eq('order_type', 'delivery')
            .in('status', ['preparing', 'ready'])
            .order('created_at', { ascending: false });

        if (error) {
            console.error(error);
            document.getElementById('pedidosList').innerHTML = '<p>Error cargando pedidos</p>';
            return;
        }
        if (data.length === 0) {
            document.getElementById('pedidosList').innerHTML = '<p>No hay pedidos para entregar en este momento.</p>';
            return;
        }
        let html = '';
        data.forEach(ped => {
            const estadoTexto = ped.status === 'ready' ? '✅ Listo' : '🟠 En preparación';
            html += `
                <div class="pedido-item" data-id="${ped.id}" data-number="${ped.order_number}">
                    <div class="pedido-numero">${ped.order_number}</div>
                    <div class="pedido-cliente">${ped.customer_name || 'Cliente'} - ${ped.delivery_address || 'Sin dirección'}</div>
                    <div class="badge ${ped.status}">${estadoTexto}</div>
                </div>
            `;
        });
        document.getElementById('pedidosList').innerHTML = html;

        // Agregar eventos click a cada pedido
        document.querySelectorAll('.pedido-item').forEach(el => {
            el.addEventListener('click', () => {
                const id = parseInt(el.dataset.id);
                const orderNumber = el.dataset.number;
                seleccionarPedido(id, orderNumber);
            });
        });
    }

    async function seleccionarPedido(pedidoId, orderNumber) {
        // Ocultar lista, mostrar panel de tracking
        document.getElementById('listaPanel').style.display = 'none';
        document.getElementById('trackingPanel').style.display = 'block';

        // Cargar datos completos del pedido
        const { data: pedido, error } = await supabase
            .from('pedidos')
            .select('*')
            .eq('id', pedidoId)
            .single();

        if (error || !pedido) {
            alert('Error al cargar el pedido');
            volverLista();
            return;
        }
        currentPedido = pedido;
        document.getElementById('orderNumber').innerText = pedido.order_number;
        document.getElementById('customerName').innerText = pedido.customer_name || '---';
        document.getElementById('customerAddress').innerText = pedido.delivery_address || '---';

        // Obtener coordenadas del destino (si no tiene, asignar por defecto)
        destinoCoords = await obtenerDestinoCoords(pedido);
        if (!destinoCoords) {
            alert('No se pudo determinar la dirección del cliente');
            volverLista();
            return;
        }

        // Inicializar mapa
        if (map) map.remove();
        map = L.map('mapa').setView([destinoCoords.lat, destinoCoords.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.marker([destinoCoords.lat, destinoCoords.lng]).addTo(map).bindPopup('📍 Cliente');

        // Iniciar tracking si el pedido no está entregado
        if (pedido.status === 'delivered') {
            document.getElementById('btnEntregar').disabled = true;
            document.getElementById('etaPanel').innerHTML = '✅ Pedido ya entregado';
        } else {
            startTracking();
        }

        // Botón entregar
        const btnEntregar = document.getElementById('btnEntregar');
        btnEntregar.onclick = async () => {
            const { error } = await supabase
                .from('pedidos')
                .update({ status: 'delivered', delivered_at: new Date() })
                .eq('id', pedido.id);
            if (!error) {
                alert('Pedido entregado');
                if (watchId) navigator.geolocation.clearWatch(watchId);
                btnEntregar.disabled = true;
                document.getElementById('etaPanel').innerHTML = '✅ Pedido entregado';
                // Volver a la lista después de 2 segundos
                setTimeout(() => volverLista(), 2000);
            } else {
                alert('Error al actualizar');
            }
        };
    }

    async function obtenerDestinoCoords(pedido) {
        if (pedido.destino_lat && pedido.destino_lng) {
            return { lat: pedido.destino_lat, lng: pedido.destino_lng };
        }
        // Coordenadas por defecto (Miraflores)
        const coords = { lat: -12.119, lng: -77.031 };
        // Guardar en BD para futuras ocasiones
        await supabase.from('pedidos').update({ destino_lat: coords.lat, destino_lng: coords.lng }).eq('id', pedido.id);
        return coords;
    }

    function startTracking() {
        if (!navigator.geolocation) {
            alert('Geolocalización no soportada');
            return;
        }
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(
            async (pos) => {
                const { latitude, longitude } = pos.coords;
                if (!routingControl) {
                    routingControl = L.Routing.control({
                        waypoints: [L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)],
                        routeWhileDragging: false,
                        showAlternatives: false,
                        lineOptions: { styles: [{ color: '#3388ff', weight: 5 }] },
                        addWaypoints: false,
                        draggableWaypoints: false
                    }).addTo(map);
                    routingControl.on('routesfound', (e) => {
                        const r = e.routes[0];
                        const dist = (r.summary.totalDistance / 1000).toFixed(1);
                        const time = Math.round(r.summary.totalTime / 60);
                        document.getElementById('etaPanel').innerHTML = `📏 Distancia restante: ${dist} km · ⏱️ ${time} minutos`;
                    });
                } else {
                    routingControl.getPlan().setWaypoints([L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)]);
                }
                await supabase.from('ubicacion_repartidor').upsert({
                    pedido_id: currentPedido.id,
                    lat: latitude,
                    lng: longitude,
                    updated_at: new Date()
                });
            },
            (err) => console.error('Error GPS:', err),
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    }

    function volverLista() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (routingControl) routingControl = null;
        if (map) map.remove();
        document.getElementById('trackingPanel').style.display = 'none';
        document.getElementById('listaPanel').style.display = 'block';
        cargarPedidos(); // refrescar lista
    }

    document.getElementById('btnVolver').addEventListener('click', volverLista);

    // Suscripción en tiempo real para actualizar la lista automáticamente
    function suscribirActualizacionPedidos() {
        if (subscriptionPedidos) supabase.removeChannel(subscriptionPedidos);
        subscriptionPedidos = supabase
            .channel('pedidos-repartidor')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, () => {
                // Si estamos en la lista, recargarla; si estamos en tracking, podríamos actualizar datos
                if (document.getElementById('listaPanel').style.display !== 'none') {
                    cargarPedidos();
                } else if (currentPedido) {
                    // Opcional: actualizar info del pedido actual si cambia estado
                    supabase.from('pedidos').select('*').eq('id', currentPedido.id).single().then(({ data }) => {
                        if (data && data.status === 'delivered') {
                            alert('Este pedido fue marcado como entregado por otro dispositivo');
                            volverLista();
                        }
                    });
                }
            })
            .subscribe();
    }

    cargarPedidos();
    suscribirActualizacionPedidos();
</script>
</body>
</html>
