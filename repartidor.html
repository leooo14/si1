<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>LEOPI FOOD | Panel del Repartidor</title>
    <!-- Leaflet + Routing Machine -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        /* Panel de lista de pedidos */
        .pedidos-lista {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(249,115,22,0.3);
        }
        .pedidos-lista h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #f97316, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .pedido-item {
            background: #1e293b;
            margin-bottom: 16px;
            padding: 18px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 5px solid #f97316;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }
        .pedido-item:hover {
            transform: translateX(8px);
            background: #334155;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
        .pedido-numero {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 1px;
            color: #facc15;
            margin-bottom: 6px;
        }
        .pedido-cliente {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 6px 0;
        }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .badge.ready {
            background: #10b981;
            color: white;
            box-shadow: 0 0 8px rgba(16,185,129,0.5);
        }
        .badge.preparing {
            background: #f59e0b;
            color: #0f172a;
        }
        /* Panel de seguimiento */
        .info-panel {
            background: #0f172a;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .track-info {
            background: #1e293b;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .track-info div {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .track-info strong {
            color: #f97316;
        }
        #mapa {
            height: 380px;
            border-radius: 24px;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            border: 2px solid #f97316;
        }
        button {
            background: linear-gradient(135deg, #f97316, #ea580c);
            border: none;
            padding: 14px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            color: white;
            box-shadow: 0 4px 12px rgba(249,115,22,0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249,115,22,0.4);
        }
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        .volver {
            background: #475569;
            box-shadow: none;
            margin-bottom: 16px;
        }
        .eta {
            background: #1e293b;
            padding: 14px;
            border-radius: 20px;
            text-align: center;
            font-weight: 500;
            margin-top: 16px;
            font-size: 0.9rem;
            border-left: 4px solid #10b981;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }
        @media (max-width: 640px) {
            body { padding: 12px; }
            .pedidos-lista, .info-panel { padding: 18px; }
            .pedido-numero { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Panel de lista de pedidos -->
    <div id="listaPanel" class="pedidos-lista">
        <h2>📋 Mis entregas</h2>
        <div id="pedidosList">Cargando pedidos...</div>
    </div>

    <!-- Panel de tracking (se muestra al seleccionar un pedido) -->
    <div id="trackingPanel" class="info-panel" style="display: none;">
        <button id="btnVolver" class="volver">← Volver a la lista</button>
        <div class="track-info">
            <div><strong>Pedido:</strong> <span id="orderNumber">---</span></div>
            <div><strong>Cliente:</strong> <span id="customerName">---</span></div>
            <div><strong>Dirección:</strong> <span id="customerAddress">---</span></div>
        </div>
        <div id="mapa"></div>
        <div id="etaPanel" class="eta">🔄 Calculando ruta...</div>
        <button id="btnEntregar">✅ Marcar como entregado</button>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN SUPABASE (variable única para evitar conflictos) ---
    const SUPABASE_URL = 'https://jznsyvdasufrvudfglje.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6bnN5dmRhc3VmcnZ1ZGZnbGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODAyMDgsImV4cCI6MjA5NTI1NjIwOH0.nIHQHqEv9Gf_jZNOgpomkJ7SznGqg5dDB40kIVkIgig';
    // Usamos un nombre de variable distinto para evitar cualquier conflicto global
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- VARIABLES GLOBALES ---
    let map, routingControl, watchId;
    let currentPedido = null;
    let destinoCoords = null;
    let realtimeChannel = null;

    // --- FUNCIÓN: Cargar lista de pedidos (delivery, estados preparing o ready) ---
    async function cargarPedidos() {
        const listaDiv = document.getElementById('pedidosList');
        try {
            const { data, error } = await supabaseClient
                .from('pedidos')
                .select('id, order_number, customer_name, delivery_address, status, destino_lat, destino_lng, created_at')
                .eq('order_type', 'delivery')
                .in('status', ['preparing', 'ready'])
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                listaDiv.innerHTML = '<div class="empty-state">🚚 No hay pedidos para entregar en este momento.</div>';
                return;
            }

            let html = '';
            data.forEach(p => {
                const estadoTexto = p.status === 'ready' ? '✅ LISTO' : '🟠 EN PREPARACIÓN';
                html += `
                    <div class="pedido-item" data-id="${p.id}" data-lat="${p.destino_lat || ''}" data-lng="${p.destino_lng || ''}">
                        <div class="pedido-numero">${p.order_number}</div>
                        <div class="pedido-cliente">${p.customer_name || 'Cliente'} • ${p.delivery_address || 'Dirección no especificada'}</div>
                        <div class="badge ${p.status}">${estadoTexto}</div>
                    </div>
                `;
            });
            listaDiv.innerHTML = html;

            // Asignar eventos a cada pedido
            document.querySelectorAll('.pedido-item').forEach(el => {
                el.addEventListener('click', () => {
                    const id = parseInt(el.dataset.id);
                    const lat = el.dataset.lat ? parseFloat(el.dataset.lat) : null;
                    const lng = el.dataset.lng ? parseFloat(el.dataset.lng) : null;
                    seleccionarPedido(id, lat, lng);
                });
            });
        } catch (err) {
            console.error(err);
            listaDiv.innerHTML = `<div class="empty-state">❌ Error: ${err.message}</div>`;
        }
    }

    // --- FUNCIÓN: Seleccionar un pedido y empezar tracking ---
    async function seleccionarPedido(pedidoId, lat, lng) {
        // Ocultar lista y mostrar panel de tracking
        document.getElementById('listaPanel').style.display = 'none';
        document.getElementById('trackingPanel').style.display = 'block';

        // Obtener datos completos del pedido (por si faltan)
        const { data: pedido, error } = await supabaseClient
            .from('pedidos')
            .select('*')
            .eq('id', pedidoId)
            .single();

        if (error || !pedido) {
            alert('Error al cargar el pedido');
            volverLista();
            return;
        }

        currentPedido = pedido;
        document.getElementById('orderNumber').innerText = pedido.order_number;
        document.getElementById('customerName').innerText = pedido.customer_name || '---';
        document.getElementById('customerAddress').innerText = pedido.delivery_address || '---';

        // Obtener coordenadas del destino (cliente)
        if (pedido.destino_lat && pedido.destino_lng) {
            destinoCoords = { lat: pedido.destino_lat, lng: pedido.destino_lng };
        } else {
            // Si no tiene, usar coordenadas por defecto (Miraflores) y guardarlas en la BD
            destinoCoords = { lat: -12.119, lng: -77.031 };
            await supabaseClient
                .from('pedidos')
                .update({ destino_lat: destinoCoords.lat, destino_lng: destinoCoords.lng })
                .eq('id', pedido.id);
        }

        // Inicializar mapa centrado en el destino
        if (map) map.remove();
        map = L.map('mapa').setView([destinoCoords.lat, destinoCoords.lng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        L.marker([destinoCoords.lat, destinoCoords.lng]).addTo(map)
            .bindPopup('📍 Cliente')
            .openPopup();

        // Si el pedido ya está entregado, deshabilitar tracking
        if (pedido.status === 'delivered') {
            document.getElementById('btnEntregar').disabled = true;
            document.getElementById('etaPanel').innerHTML = '✅ Pedido ya entregado';
            return;
        }

        // Iniciar geolocalización y ruta
        iniciarGPS();

        // Botón de entregar
        document.getElementById('btnEntregar').onclick = async () => {
            const { error: updateError } = await supabaseClient
                .from('pedidos')
                .update({ status: 'delivered', delivered_at: new Date() })
                .eq('id', pedido.id);
            if (!updateError) {
                alert('✅ Pedido entregado correctamente');
                if (watchId) navigator.geolocation.clearWatch(watchId);
                volverLista();
            } else {
                alert('❌ Error al actualizar estado');
            }
        };
    }

    // --- FUNCIÓN: Iniciar seguimiento GPS y ruta ---
    function iniciarGPS() {
        if (!navigator.geolocation) {
            alert('Tu navegador no soporta geolocalización');
            return;
        }
        if (watchId) navigator.geolocation.clearWatch(watchId);

        watchId = navigator.geolocation.watchPosition(
            async (position) => {
                const { latitude, longitude } = position.coords;
                // Crear o actualizar el control de rutas
                if (!routingControl) {
                    routingControl = L.Routing.control({
                        waypoints: [L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)],
                        routeWhileDragging: false,
                        showAlternatives: false,
                        lineOptions: { styles: [{ color: '#f97316', weight: 5, opacity: 0.8 }] },
                        addWaypoints: false,
                        draggableWaypoints: false,
                        fitSelectedRoutes: false
                    }).addTo(map);
                    routingControl.on('routesfound', (e) => {
                        const route = e.routes[0];
                        const distanciaKm = (route.summary.totalDistance / 1000).toFixed(1);
                        const tiempoMin = Math.round(route.summary.totalTime / 60);
                        document.getElementById('etaPanel').innerHTML = `📏 Distancia restante: ${distanciaKm} km · ⏱️ ${tiempoMin} minutos`;
                    });
                } else {
                    routingControl.getPlan().setWaypoints([L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)]);
                }

                // Guardar ubicación en Supabase
                await supabaseClient
                    .from('ubicacion_repartidor')
                    .upsert({
                        pedido_id: currentPedido.id,
                        lat: latitude,
                        lng: longitude,
                        updated_at: new Date()
                    });
            },
            (error) => {
                console.error('Error GPS:', error);
                document.getElementById('etaPanel').innerHTML = '⚠️ Error al obtener ubicación. Revisa permisos.';
            },
            { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
        );
    }

    // --- FUNCIÓN: Volver a la lista y limpiar recursos ---
    function volverLista() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (routingControl) {
            routingControl = null;
        }
        if (map) {
            map.remove();
            map = null;
        }
        document.getElementById('trackingPanel').style.display = 'none';
        document.getElementById('listaPanel').style.display = 'block';
        cargarPedidos(); // refrescar lista
    }

    // --- SUSCRIPCIÓN EN TIEMPO REAL (para actualizar la lista automáticamente) ---
    function suscribirCambiosPedidos() {
        if (realtimeChannel) supabaseClient.removeChannel(realtimeChannel);
        realtimeChannel = supabaseClient
            .channel('repartidor-pedidos')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'pedidos' },
                (payload) => {
                    // Si estamos viendo la lista, recargarla
                    if (document.getElementById('listaPanel').style.display !== 'none') {
                        cargarPedidos();
                    } else if (currentPedido && payload.new && payload.new.id === currentPedido.id) {
                        // Si estamos en tracking y el pedido actual cambia (ej. entregado)
                        if (payload.new.status === 'delivered') {
                            alert('Este pedido fue marcado como entregado por el administrador');
                            volverLista();
                        } else {
                            // Opcional: actualizar el estado visible en el panel de tracking
                            // Por simplicidad, recargamos la lista y volvemos?
                            // Mejor solo refrescar datos
                            cargarPedidos();
                        }
                    }
                }
            )
            .subscribe((status) => {
                console.log('Suscripción Realtime activa:', status);
            });
    }

    // --- EVENTO BOTÓN VOLVER ---
    document.getElementById('btnVolver').addEventListener('click', volverLista);

    // --- INICIALIZACIÓN ---
    cargarPedidos();
    suscribirCambiosPedidos();
</script>
</body>
</html>
