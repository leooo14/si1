<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEOPI FOOD | Panel del Repartidor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #1e293b; color: white; }
        #mapa { height: 500px; border-radius: 12px; margin-bottom: 20px; }
        .info { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        button { background: #22c55e; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #16a34a; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .eta { background: #334155; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
        @media (max-width: 640px) { .info { flex-direction: column; align-items: stretch; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="info">
        <div><strong>Pedido:</strong> <span id="orderNumber">---</span></div>
        <div><strong>Cliente:</strong> <span id="customerName">---</span></div>
        <div><strong>Dirección:</strong> <span id="customerAddress">---</span></div>
        <button id="btnEntregar">✅ Marcar como entregado</button>
    </div>
    <div id="mapa"></div>
    <div class="eta" id="etaPanel">🔄 Calculando ruta...</div>

    <script>
        const supabaseUrl = 'https://jznsyvdasufrvudfglje.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6bnN5dmRhc3VmcnZ1ZGZnbGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2ODAyMDgsImV4cCI6MjA5NTI1NjIwOH0.nIHQHqEv9Gf_jZNOgpomkJ7SznGqg5dDB40kIVkIgig';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let map, routingControl, watchId, currentPedido, destinoCoords;

        // Obtener código del pedido desde URL (ej: ?pedido=ORD-123)
        const orderNumber = new URLSearchParams(window.location.search).get('pedido');
        if (!orderNumber) {
            document.body.innerHTML = '<h2>Error: No se especificó el número de pedido</h2><a href="javascript:history.back()">Volver</a>';
            throw new Error('Falta pedido');
        }

        // Función para obtener coordenadas del destino (prioriza las guardadas, si no, usa por defecto y guarda)
        async function obtenerDestinoCoords(pedido) {
            if (pedido.destino_lat && pedido.destino_lng) {
                return { lat: pedido.destino_lat, lng: pedido.destino_lng };
            }
            // Si es delivery y no tiene coordenadas, usar coordenadas por defecto (Miraflores)
            if (pedido.order_type === 'delivery') {
                const coordsPorDefecto = { lat: -12.119, lng: -77.031 };
                // Guardar en la BD para futuras ocasiones
                await supabase
                    .from('pedidos')
                    .update({ destino_lat: coordsPorDefecto.lat, destino_lng: coordsPorDefecto.lng })
                    .eq('id', pedido.id);
                console.log('Coordenadas por defecto asignadas al pedido', pedido.order_number);
                return coordsPorDefecto;
            }
            return null;
        }

        async function init() {
            // Cargar pedido
            const { data: pedido, error } = await supabase.from('pedidos').select('*').eq('order_number', orderNumber).single();
            if (error || !pedido) {
                alert('Pedido no encontrado');
                return;
            }
            currentPedido = pedido;
            document.getElementById('orderNumber').innerText = pedido.order_number;
            document.getElementById('customerName').innerText = pedido.customer_name || '---';
            document.getElementById('customerAddress').innerText = pedido.delivery_address || '---';

            // Obtener coordenadas del destino
            destinoCoords = await obtenerDestinoCoords(pedido);
            if (!destinoCoords) {
                alert('No se pudo determinar la ubicación del cliente');
                return;
            }

            // Si el pedido ya está entregado, deshabilitar tracking
            if (pedido.status === 'delivered') {
                document.getElementById('btnEntregar').disabled = true;
                document.getElementById('etaPanel').innerHTML = '✅ Pedido ya entregado';
                map = L.map('mapa').setView([destinoCoords.lat, destinoCoords.lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.marker([destinoCoords.lat, destinoCoords.lng]).addTo(map).bindPopup('📍 Cliente');
                return;
            }

            // Inicializar mapa centrado en el destino
            map = L.map('mapa').setView([destinoCoords.lat, destinoCoords.lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            L.marker([destinoCoords.lat, destinoCoords.lng]).addTo(map).bindPopup('📍 Cliente');

            // Iniciar tracking de ubicación
            startTracking();

            // Botón entregado
            document.getElementById('btnEntregar').onclick = async () => {
                const { error } = await supabase
                    .from('pedidos')
                    .update({ status: 'delivered', delivered_at: new Date() })
                    .eq('id', pedido.id);
                if (!error) {
                    alert('Pedido marcado como entregado');
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    document.getElementById('btnEntregar').disabled = true;
                    document.getElementById('etaPanel').innerHTML = '✅ Pedido entregado';
                } else {
                    alert('Error al actualizar');
                }
            };
        }

        function startTracking() {
            if (!navigator.geolocation) return alert('Geolocalización no soportada');
            watchId = navigator.geolocation.watchPosition(
                async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    // Actualizar o crear ruta
                    if (!routingControl) {
                        routingControl = L.Routing.control({
                            waypoints: [L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)],
                            routeWhileDragging: false,
                            showAlternatives: false,
                            lineOptions: { styles: [{ color: '#3388ff', weight: 5 }] },
                            addWaypoints: false,
                            draggableWaypoints: false
                        }).addTo(map);
                        routingControl.on('routesfound', (e) => {
                            const r = e.routes[0];
                            const dist = (r.summary.totalDistance / 1000).toFixed(1);
                            const time = Math.round(r.summary.totalTime / 60);
                            document.getElementById('etaPanel').innerHTML = `📏 Distancia restante: ${dist} km · ⏱️ ${time} minutos`;
                        });
                    } else {
                        routingControl.getPlan().setWaypoints([L.latLng(latitude, longitude), L.latLng(destinoCoords.lat, destinoCoords.lng)]);
                    }
                    // Guardar ubicación en Supabase
                    await supabase.from('ubicacion_repartidor').upsert({
                        pedido_id: currentPedido.id,
                        lat: latitude,
                        lng: longitude,
                        updated_at: new Date()
                    });
                },
                (err) => console.error('Error GPS:', err),
                { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
            );
        }

        init();
    </script>
</body>
</html>
